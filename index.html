<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/gwangju-deundeun/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/gwangju-deundeun/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="광주광역시 어르신·1인가구 안심돌봄 웹 서비스. 광주 5개 자치구의 응급의료기관·약국을 실시간으로 안내하고 안심점수를 자동 산출합니다." />
    <meta name="theme-color" content="#FF8C42" />

    <!-- 다크모드 강제 무력화 (iOS Safari + 카카오톡 인앱 브라우저 대응) -->
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light" />

    <!-- 오픈그래프 (카카오톡 공유 시) -->
    <meta property="og:title" content="광주든든 - 어르신 안심돌봄" />
    <meta property="og:description" content="광주 어르신·1인가구를 위한 즉시 안심돌봄 서비스" />
    <meta property="og:image" content="/gwangju-deundeun/favicon.png?v=2" />
    <meta property="og:type" content="website" />

    <style>
      /* 다크모드 강제 무력화 (전역) */
      :root {
        color-scheme: light only;
      }
      html, body {
        color-scheme: light only;
        background-color: #ffffff;
      }

      /* 모든 input의 글자색 강제 (카카오톡 인앱 브라우저 + iOS Safari) */
      input[type="text"],
      input[type="search"],
      input[type="tel"],
      input[type="email"],
      input[type="number"],
      input:not([type]),
      textarea {
        color: #222222 !important;
        -webkit-text-fill-color: #222222 !important;
        background-color: transparent !important;
        opacity: 1 !important;
        caret-color: #FF8C42 !important;
      }

      input::placeholder,
      textarea::placeholder {
        color: #999999 !important;
        -webkit-text-fill-color: #999999 !important;
        opacity: 1 !important;
      }

      /* iOS 자동 채우기 시 노란 배경 방지 */
      input:-webkit-autofill,
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: #222222 !important;
        -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
        caret-color: #FF8C42 !important;
      }
    </style>

    <title>광주든든 - 어르신 안심돌봄</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
